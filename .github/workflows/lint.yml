name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash syntax check
        run: |
          bash -n bin/ferment
          bash -n install.sh
          bash -n uninstall.sh

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          ignore_paths: 'completions'

  bats:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('test/**/*.bats') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: run bats
        run: bats test

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install just
        uses: extractions/setup-just@v2

      - name: just smoke
        run: just smoke
